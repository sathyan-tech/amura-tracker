name: Deploy Amura Tracker

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout private config repo
        uses: actions/checkout@v4
        with:
          repository: sathyan-tech/amura-config
          token: ${{ secrets.CONFIG_REPO_TOKEN }}
          path: config

      - name: Inject Firebase config
        run: |
          sed -i \
            -e 's|__FIREBASE_API_KEY__|${{ secrets.FIREBASE_API_KEY }}|g' \
            -e 's|__FIREBASE_AUTH_DOMAIN__|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g' \
            -e 's|__FIREBASE_PROJECT_ID__|${{ secrets.FIREBASE_PROJECT_ID }}|g' \
            -e 's|__FIREBASE_STORAGE_BUCKET__|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g' \
            -e 's|__FIREBASE_MESSAGING_SENDER_ID__|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g' \
            -e 's|__FIREBASE_APP_ID__|${{ secrets.FIREBASE_APP_ID }}|g' \
            -e 's|__FIREBASE_MEASUREMENT_ID__|${{ secrets.FIREBASE_MEASUREMENT_ID }}|g' \
            public/index.html

      - name: Inject Gemini API key
        run: |
          GEMINI_KEY=$(jq -r '.geminiApiKey' config/firebase-config.json)
          sed -i "s|__GEMINI_API_KEY__|${GEMINI_KEY}|g" public/index.html

      - name: Verify no placeholders remain
        run: |
          if grep -q '__FIREBASE_\|__GEMINI_' public/index.html; then
            echo "ERROR: Unreplaced placeholders found!"
            grep '__FIREBASE_\|__GEMINI_' public/index.html
            exit 1
          fi
          echo "All placeholders replaced successfully"

      - name: Write version.json
        run: echo '{"sha":"${{ github.sha }}"}' > public/version.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

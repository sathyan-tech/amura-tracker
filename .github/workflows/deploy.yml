name: Deploy Amura Tracker

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Check out the public repo (this repo) ──────────────────
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          path: public

      # ── Step 2: Check out the private config repo ───────────────────────
      # Requires a Personal Access Token (PAT) with repo scope stored as
      # secret CONFIG_REPO_TOKEN in the public repo's Actions secrets.
      - name: Checkout private config repo
        uses: actions/checkout@v4
        with:
          repository: sathyan-tech/amura-config
          token: ${{ secrets.CONFIG_REPO_TOKEN }}
          path: config

      # ── Step 3: Read config and inject into index.html ──────────────────
      - name: Inject Firebase config
        run: |
          cp public/index.html public/index.html.bak

          # Read each value from the private config JSON
          API_KEY=$(jq -r '.apiKey' config/firebase-config.json)
          AUTH_DOMAIN=$(jq -r '.authDomain' config/firebase-config.json)
          PROJECT_ID=$(jq -r '.projectId' config/firebase-config.json)
          STORAGE_BUCKET=$(jq -r '.storageBucket' config/firebase-config.json)
          SENDER_ID=$(jq -r '.messagingSenderId' config/firebase-config.json)
          APP_ID=$(jq -r '.appId' config/firebase-config.json)
          MEASUREMENT_ID=$(jq -r '.measurementId' config/firebase-config.json)

          sed -i \
            -e "s|__FIREBASE_API_KEY__|${API_KEY}|g" \
            -e "s|__FIREBASE_AUTH_DOMAIN__|${AUTH_DOMAIN}|g" \
            -e "s|__FIREBASE_PROJECT_ID__|${PROJECT_ID}|g" \
            -e "s|__FIREBASE_STORAGE_BUCKET__|${STORAGE_BUCKET}|g" \
            -e "s|__FIREBASE_MESSAGING_SENDER_ID__|${SENDER_ID}|g" \
            -e "s|__FIREBASE_APP_ID__|${APP_ID}|g" \
            -e "s|__FIREBASE_MEASUREMENT_ID__|${MEASUREMENT_ID}|g" \
            public/index.html

      # ── Step 4: Verify no placeholders remain (fails build if missed) ───
      - name: Verify injection complete
        run: |
          if grep -q '__FIREBASE_' public/index.html; then
            echo "ERROR: Unreplaced Firebase placeholders found!"
            grep '__FIREBASE_' public/index.html
            exit 1
          fi
          echo "All placeholders replaced successfully"

      # ── Step 5: Write version.json for auto-refresh ─────────────────────
      - name: Write version.json
        run: echo '{"sha":"${{ github.sha }}"}' > public/version.json

      # ── Step 6: Deploy to GitHub Pages ──────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
